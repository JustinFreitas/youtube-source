name: Bump and Release

on:
  repository_dispatch:
    types: [bump-lavaplayer]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_PAT }}

      - name: Update settings.gradle.kts
        run: |
          VERSION="${{ github.event.client_payload.lavaplayer_version }}"
          sed -i "s/version(\"lavaplayer-v1\", \".*\")/version(\"lavaplayer-v1\", \"$VERSION\")/g" settings.gradle.kts
          sed -i "s/version(\"lavaplayer-v2\", \".*\")/version(\"lavaplayer-v2\", \"$VERSION\")/g" settings.gradle.kts

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          for i in {1..3}; do
            ./gradlew build --no-daemon && break || {
              if [ $i -lt 3 ]; then
                echo "Build failed. Waiting 60s before retry..."
                sleep 60
              else
                exit 1
              fi
            }
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "build: bump lavaplayer to ${{ github.event.client_payload.lavaplayer_version }}"
          git push

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
        run: |
          LATEST_TAG=$(gh release list --limit 1 | awk '{print $1}')
          # Increment the patch number after the underscore (e.g., v1.18.1_1 -> v1.18.1_2)
          BASE=$(echo $LATEST_TAG | awk -F_ '{print $1}')
          PATCH=$(echo $LATEST_TAG | awk -F_ '{print $2}')
          NEXT_PATCH=$((PATCH + 1))
          NEW_TAG="${BASE}_${NEXT_PATCH}"
          
          gh release create $NEW_TAG --generate-notes
