name: Dependency Autopilot

on:
  schedule:
    # Run every other day at 02:00 UTC (after lavaplayer autopilot has completed)
    - cron: '0 2 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PIPELINE_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Dependency Scan
        run: ./gradlew dependencyUpdates --no-daemon

      - name: Run Dependency Update Script
        id: run-script
        run: python .github/scripts/check_and_update.py

      - name: Commit and Push Version Catalog changes (if any)
        if: steps.run-script.outputs.updated == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="dep-update/${{ steps.run-script.outputs.next_version }}"
          git checkout -b "$BRANCH_NAME"
          git add settings.gradle.kts
          git add gradle/wrapper/gradle-wrapper.properties gradle/wrapper/gradle-wrapper.jar || true
          git commit -m "chore(deps): automatically update dependencies to ${{ steps.run-script.outputs.next_version }}"
          git push origin "$BRANCH_NAME" --force

          # Merge to main
          git checkout main
          git pull origin main
          git merge "$BRANCH_NAME" --no-ff -m "Merge branch '$BRANCH_NAME' into main"
          git tag -a "${{ steps.run-script.outputs.next_version }}" -m "Release version ${{ steps.run-script.outputs.next_version }}"
          git push origin main
          git push origin "${{ steps.run-script.outputs.next_version }}"

      - name: Create GitHub Release
        if: steps.run-script.outputs.updated == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.run-script.outputs.next_version }}
          name: Release ${{ steps.run-script.outputs.next_version }}
          body: |
            ## Automated Dependency Update Release
            This release was automatically generated by the Dependency Autopilot workflow.
            
            ### Changes:
            $(python -c "import json; d = json.load(open('build/dependency_changes.json')); print('\n'.join('- ' + c for c in d['changes']))")
          token: ${{ secrets.PIPELINE_PAT || secrets.GITHUB_TOKEN }}
